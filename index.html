<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Task Manager</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <h1>Task Manager</h1>
    <button id="theme-toggle" title="Toggle theme (d)">🌙</button>
  </header>

  <main>
    <form id="task-form">
      <input type="text" id="title-input" placeholder="Task title" />
      <textarea id="desc-input" placeholder="Description (optional)"></textarea>
      <select id="priority-input">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button type="submit">Add Task</button>
      <p id="form-error" class="error-msg"></p>
    </form>

    <div class="controls">
      <input type="text" id="search-input" placeholder="Search tasks..." />

      <select id="filter-status">
        <option value="all">All Status</option>
        <option value="pending">Pending</option>
        <option value="done">Done</option>
      </select>

      <select id="filter-priority">
        <option value="all">All Priorities</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>

      <select id="sort-select">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="priority">Priority</option>
        <option value="az">A-Z</option>
      </select>
    </div>

  <div class="progress-wrap">
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  <p class="progress-label" id="progress-label">0% complete</p>
</div>

<div id="task-list"></div>
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
